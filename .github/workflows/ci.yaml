name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  ktlint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 17
      - run: curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint && chmod a+x ktlint
      - run: ./ktlint

  gradle:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
          - windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # https://github.com/gradle/actions/blob/50e97c2cd7a37755bbfafc9c5b7cafaece252f6e/docs/setup-gradle.md
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew build

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
